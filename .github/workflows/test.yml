name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}

    steps:
      - uses: actions/checkout@v4

      - uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: "3.11"
          channels: conda-forge
          activate-environment: cadforge

      - name: Install CadQuery
        run: conda install -y cadquery

      - name: Install CAiD and caid-mcp
        run: |
          pip install caid
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short
