name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CAiD and caid-mcp
        run: |
          python -m pip install "caid @ git+https://github.com/dreliq9/CAiD.git"
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short
